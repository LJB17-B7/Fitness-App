<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Get Ripped">
<title>Get Ripped</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #020817; --bg1: #0f172a; --bg2: #1e293b;
    --border: #1e293b; --border2: #334155;
    --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b; --text4: #475569;
    --blue: #3b82f6; --blue-dim: rgba(59,130,246,.12);
    --orange: #f97316; --green: #10b981; --purple: #a855f7;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Text', sans-serif; overflow: hidden; }
  #root { display: flex; flex-direction: column; height: 100%; }

  /* HEADER */
  .header { padding: calc(var(--safe-top) + 16px) 20px 14px; border-bottom: 1px solid var(--bg1); flex-shrink: 0; background: var(--bg); }
  .header-eyebrow { font-size: 11px; color: var(--blue); font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 2px; }
  .header-title { font-size: 26px; font-weight: 700; background: linear-gradient(135deg, #f1f5f9, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-sub { font-size: 12px; color: var(--text4); margin-top: 2px; }

  /* SCROLL AREA */
  .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 16px 0; }

  /* BOTTOM NAV */
  .bottom-nav { display: flex; background: rgba(2,8,23,.96); border-top: 1px solid var(--bg1); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); padding-bottom: var(--safe-bot); flex-shrink: 0; }
  .nav-btn { flex: 1; border: none; background: transparent; padding: 10px 0 6px; cursor: pointer; transition: color .15s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .nav-icon { font-size: 22px; }
  .nav-label { font-size: 10px; font-weight: 500; }

  /* CARDS */
  .card { background: var(--bg1); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; }
  .section-eyebrow { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text4); margin-bottom: 10px; }

  /* WEEK TABS */
  .week-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .week-tab { flex: 1; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text3); padding: 9px 4px; cursor: pointer; text-align: center; transition: all .15s; }
  .week-tab.active { border: 1.5px solid var(--blue); background: var(--blue-dim); color: #60a5fa; }
  .week-tab-num { font-size: 13px; font-weight: 600; }
  .week-tab-theme { font-size: 10px; margin-top: 1px; }

  /* DAY PILLS */
  .day-pills { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 12px; }
  .day-pill { border: 1px solid var(--border); border-radius: 8px; padding: 7px 2px; text-align: center; cursor: pointer; transition: all .15s; background: transparent; }
  .day-pill.active { border: 1.5px solid var(--blue); background: rgba(59,130,246,.1); }
  .day-pill-name { font-size: 10px; font-weight: 600; color: var(--text2); }
  .day-pill-focus { font-size: 8.5px; color: var(--text4); margin-top: 2px; line-height: 1.2; }
  .day-pill.active .day-pill-name { color: #60a5fa; }

  /* WORKOUT DETAIL */
  .workout-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .workout-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .tag-badge { font-size: 10px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .workout-note { font-size: 12px; color: var(--text3); line-height: 1.55; margin-bottom: 12px; }
  .ex-table { width: 100%; border-collapse: collapse; }
  .ex-table th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--text4); font-weight: 500; padding-bottom: 7px; border-bottom: 1px solid var(--border); }
  .ex-table td { padding: 8px 6px 8px 0; border-bottom: 1px solid rgba(30,41,59,.6); vertical-align: top; }
  .ex-table tr:last-child td { border-bottom: none; }
  .ex-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .ex-sets { font-size: 13px; font-weight: 700; color: var(--blue); }
  .ex-reps { font-size: 12px; color: var(--text2); }
  .ex-note { font-size: 11px; color: var(--text4); line-height: 1.4; }
  .rest-day { text-align: center; padding: 28px 0; color: var(--text4); font-size: 13px; }

  /* MACROS */
  .macro-rings { display: flex; justify-content: space-around; align-items: center; margin-bottom: 14px; }
  .ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .ring-label { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--text3); font-weight: 500; }
  .calorie-center { text-align: center; }
  .calorie-num { font-size: 24px; font-weight: 700; color: var(--text); }
  .calorie-sub { font-size: 10px; color: var(--text4); }
  .macro-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .input-wrap label { font-size: 10px; color: var(--text4); display: block; margin-bottom: 4px; }
  .input-wrap input { width: 100%; background: var(--bg2); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); padding: 8px; font-size: 14px; outline: none; -webkit-appearance: none; text-align: center; }
  .reset-btn { width: 100%; padding: 8px 0; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text4); font-size: 12px; cursor: pointer; margin-top: 4px; }

  /* MEALS */
  .meal-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
  .meal-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .meal-cals { font-size: 12px; color: var(--text4); }
  .meal-time { font-size: 11px; color: var(--text4); margin-bottom: 8px; }
  .meal-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-top: 1px solid var(--bg2); }
  .meal-item { font-size: 12.5px; color: var(--text2); }
  .meal-macros { font-size: 11px; color: var(--text4); flex-shrink: 0; }
  .info-box { background: rgba(59,130,246,.07); border: 1px solid rgba(59,130,246,.2); border-radius: 10px; padding: 12px 14px; font-size: 12px; color: var(--text2); line-height: 1.7; margin-bottom: 12px; }

  /* PROGRESS */
  .progress-input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .field-label { font-size: 10px; color: var(--text4); margin-bottom: 4px; }
  .field-input { width: 100%; background: var(--bg2); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); padding: 8px; font-size: 14px; outline: none; -webkit-appearance: none; }
  .save-btn { width: 100%; padding: 10px 0; border-radius: 9px; border: none; background: var(--blue); color: #fff; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 4px; }
  .log-entry { background: var(--bg1); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .log-weight { font-size: 14px; font-weight: 700; color: var(--text); }
  .log-note { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .log-date { font-size: 11px; color: var(--text4); text-align: right; }
  .log-diff { font-size: 12px; font-weight: 700; text-align: right; margin-top: 2px; }
  .empty-state { text-align: center; padding: 32px 0; color: var(--text4); font-size: 13px; }
</style>
</head>
<body>
<div id="root">
  <div class="header">
    <div class="header-eyebrow">3-Week Program</div>
    <div class="header-title">Get Ripped</div>
    <div class="header-sub">Strength · Fat loss · Whitney prep</div>
  </div>
  <div class="scroll-area" id="scroll-area"></div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<script>
// ── DATA ────────────────────────────────────────────────────────────────────
const PROGRAM = {
  1: { theme:"Foundation", sub:"Establish baseline weights, dial in form, calories at a 20% deficit.", days: {
    Mon:{focus:"Push + Arms",tag:"Strength",note:"Heavy compound first, then arm volume. Rest 2–3 min on big lifts, 60–90s on isolation.",ex:[["Barbell Bench Press","4","5","RPE 8, last set AMRAP"],["Overhead Press","3","8","Controlled tempo"],["Incline Dumbbell Press","3","10","Squeeze at top"],["Skull Crushers","3","12","Elbows tucked"],["Cable Tricep Pushdown","3","15","Slow eccentric"],["Lateral Raises","3","15","Light, strict form"]]},
    Tue:{focus:"Pull + Arms",tag:"Strength",note:"Back thickness work plus direct biceps volume.",ex:[["Deadlift","4","5","RPE 8"],["Pull-Ups","4","8","Add weight if easy"],["Barbell Row","3","10","Strict, no jerking"],["Barbell Curl","3","10","No swinging"],["Hammer Curls","3","12","Squeeze at peak"],["Face Pulls","3","15","Rear delts + posture"]]},
    Wed:{focus:"Conditioning",tag:"Cardio",note:"Incline walk + ab circuit. This is fat-loss work.",ex:[["Incline Treadmill Walk","1","35 min","12–15% incline, brisk pace"],["Hanging Knee Raises","3","15",""],["Cable Crunch","3","20",""],["Plank","3","45 sec",""]]},
    Thu:{focus:"Legs",tag:"Strength",note:"Biggest muscle group — don't skip it for arm day.",ex:[["Back Squat","4","6","RPE 8"],["Romanian Deadlift","3","10","Feel the hamstring stretch"],["Leg Press","3","12","Full range"],["Walking Lunges","3","12/leg","Bodyweight or light DBs"],["Leg Curls","3","15","Slow and controlled"]]},
    Fri:{focus:"Push + Arms",tag:"Strength",note:"Second arm day. Slightly higher reps for hypertrophy.",ex:[["Dumbbell Shoulder Press","4","8","Controlled descent"],["Weighted Dips","3","10","Lean forward for chest"],["Cable Chest Fly","3","12","Squeeze at midline"],["Close-Grip Bench Press","3","10","Triceps emphasis"],["Overhead Tricep Extension","3","12","Full stretch at bottom"],["Curl 21s","2","21","Biceps burnout finisher"]]},
    Sat:{focus:"Conditioning + Abs",tag:"Cardio",note:"Long steady-state session. Hike if possible — doubles as Whitney training.",ex:[["Hike or Stairmaster","1","45–60 min","Zone 2–3 heart rate"],["Weighted Ab Rollouts","3","12",""],["Cable Woodchoppers","3","15/side",""]]},
    Sun:{focus:"Rest",tag:"Recovery",note:"rest"}
  }},
  2: { theme:"Intensity", sub:"Add weight or reps to every lift from week 1. Conditioning volume increases slightly.", days: {
    Mon:{focus:"Push + Arms",tag:"Strength",note:"Push for a small PR on bench. Add 1 set of arm finisher work vs week 1.",ex:[["Barbell Bench Press","4","5","Add 5–10 lb vs wk1"],["Overhead Press","3","8","Add 1 rep per set"],["Incline Dumbbell Press","3","10",""],["Skull Crushers","4","12","Added a set"],["Cable Tricep Pushdown","3","15",""],["Lateral Raises","4","15","Added a set"]]},
    Tue:{focus:"Pull + Arms",tag:"Strength",note:"Deadlift PR attempt on top set. Add a 4th biceps set.",ex:[["Deadlift","4","5","Top set: push for a small PR"],["Pull-Ups","4","9","One more rep than wk1"],["Barbell Row","3","10",""],["Barbell Curl","4","10","Added a set"],["Hammer Curls","3","12",""],["Face Pulls","3","15",""]]},
    Wed:{focus:"Conditioning",tag:"Cardio",note:"Longer cardio session. Abs volume increases.",ex:[["Incline Treadmill Walk","1","40 min","Add 5 min vs wk1"],["Hanging Knee Raises","4","15","Added a round"],["Cable Crunch","4","20",""],["Plank","4","45 sec",""]]},
    Thu:{focus:"Legs",tag:"Strength",note:"Squat PR attempt. Add a Bulgarian split squat.",ex:[["Back Squat","4","6","Top set: push for a small PR"],["Romanian Deadlift","3","10",""],["Leg Press","4","12","Added a set"],["Bulgarian Split Squats","3","10/leg","New addition"],["Leg Curls","3","15",""]]},
    Fri:{focus:"Push + Arms",tag:"Strength",note:"Heaviest arm-isolation day of the block so far.",ex:[["Dumbbell Shoulder Press","4","8",""],["Weighted Dips","4","10","Added a set"],["Cable Chest Fly","3","12",""],["Close-Grip Bench Press","3","10",""],["Overhead Tricep Extension","3","12",""],["Curl 21s","3","21","Added a round"]]},
    Sat:{focus:"Conditioning + Abs",tag:"Cardio",note:"Push pace slightly vs week 1.",ex:[["Hike or Stairmaster","1","50–65 min","Slightly longer than wk1"],["Weighted Ab Rollouts","3","12",""],["Cable Woodchoppers","4","15/side","Added a set"]]},
    Sun:{focus:"Rest",tag:"Recovery",note:"rest"}
  }},
  3: { theme:"Peak", sub:"Highest volume of the block. You should feel visibly leaner by the end.", days: {
    Mon:{focus:"Push + Arms",tag:"Strength",note:"Final push PR attempt. Arm volume peaks.",ex:[["Barbell Bench Press","5","5","PR attempt, added a set"],["Overhead Press","3","8",""],["Incline Dumbbell Press","4","10","Added a set"],["Skull Crushers","4","12",""],["Cable Tricep Pushdown","4","15","Added a set"],["Lateral Raises","4","15",""]]},
    Tue:{focus:"Pull + Arms",tag:"Strength",note:"Final deadlift PR. Biceps volume at its peak.",ex:[["Deadlift","5","5","PR attempt, added a set"],["Pull-Ups","5","9","Added a set"],["Barbell Row","4","10","Added a set"],["Barbell Curl","4","10",""],["Hammer Curls","4","12","Added a set"],["Face Pulls","3","15",""]]},
    Wed:{focus:"Conditioning",tag:"Cardio",note:"Peak cardio volume for the block.",ex:[["Incline Treadmill Walk","1","45 min","Peak duration"],["Hanging Knee Raises","4","20",""],["Cable Crunch","4","20",""],["Plank","4","60 sec",""]]},
    Thu:{focus:"Legs",tag:"Strength",note:"Final squat PR attempt of the block.",ex:[["Back Squat","5","6","PR attempt, added a set"],["Romanian Deadlift","4","10","Added a set"],["Leg Press","4","12",""],["Bulgarian Split Squats","3","10/leg",""],["Leg Curls","4","15","Added a set"]]},
    Fri:{focus:"Push + Arms",tag:"Strength",note:"Heaviest arm-pump day of the entire 3 weeks.",ex:[["Dumbbell Shoulder Press","4","8",""],["Weighted Dips","4","10",""],["Cable Chest Fly","4","12","Added a set"],["Close-Grip Bench Press","4","10","Added a set"],["Overhead Tricep Extension","3","12",""],["Curl 21s","3","21",""]]},
    Sat:{focus:"Conditioning + Abs",tag:"Cardio",note:"Longest session of the block. Treat it like a milestone.",ex:[["Hike or Stairmaster","1","60–75 min","Peak duration, push pace"],["Weighted Ab Rollouts","4","12","Added a set"],["Cable Woodchoppers","4","15/side",""]]},
    Sun:{focus:"Rest",tag:"Recovery",note:"rest"}
  }}
};
const MEALS = [
  {name:"Mid-Morning Shake",icon:"🥤",time:"~10–11am",cals:300,items:[["Whey protein, 1.5 scoops","35","5","2"],["Banana","1","27","0"],["Peanut butter, 1 tbsp","4","3","8"],["Almond milk, 12oz","0","1","1"]]},
  {name:"Lunch",icon:"🍗",time:"~1–2pm",cals:750,items:[["Chicken breast, 8oz","62","0","7"],["White rice, 1.5 cups cooked","7","90","1"],["Mixed veg, 2 cups","5","14","1"],["Olive oil, 1 tbsp","0","0","14"]]},
  {name:"Dinner",icon:"🥩",time:"~7–8pm",cals:900,items:[["Lean ground beef or salmon, 8oz","55","0","22"],["Sweet potato, 1 large","4","50","0"],["Side salad + 1 tbsp dressing","2","10","8"],["Greek yogurt, 1 cup","20","9","0"]]}
];
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const TAG_COLOR = {Strength:"#3b82f6",Cardio:"#f97316",Recovery:"#10b981"};
const STORAGE_KEY = "get_ripped_v1";

// ── STATE ───────────────────────────────────────────────────────────────────
let state = { tab:"workout", week:1, day:"Mon", macros:{protein:0,carbs:0,fat:0}, logs:[] };
function loadState() {
  try { const d = JSON.parse(localStorage.getItem(STORAGE_KEY)); if(d){ state.macros=d.macros||state.macros; state.logs=d.logs||[]; } } catch{}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({macros:state.macros,logs:state.logs})); } catch{}
}
loadState();

// Auto-detect today's day
const DAYMAP = {0:"Sun",1:"Mon",2:"Tue",3:"Wed",4:"Thu",5:"Fri",6:"Sat"};
state.day = DAYMAP[new Date().getDay()];

// ── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  renderNav();
  const area = document.getElementById("scroll-area");
  if(state.tab==="workout") area.innerHTML = renderWorkout();
  else if(state.tab==="diet") area.innerHTML = renderDiet();
  else area.innerHTML = renderProgress();
  bindEvents();
}

function renderNav() {
  const tabs = [{id:"workout",icon:"🏋️",label:"Workouts"},{id:"diet",icon:"🥗",label:"Diet"},{id:"progress",icon:"📈",label:"Progress"}];
  document.getElementById("bottom-nav").innerHTML = tabs.map(t=>`
    <button class="nav-btn" onclick="switchTab('${t.id}')" style="color:${state.tab===t.id?'#3b82f6':'#475569'}">
      <span class="nav-icon">${t.icon}</span>
      <span class="nav-label" style="font-weight:${state.tab===t.id?700:400}">${t.label}</span>
    </button>`).join('');
}

function renderWorkout() {
  const wk = PROGRAM[state.week];
  const dd = wk.days[state.day];
  const isRest = dd.focus==="Rest";
  const weekTabs = [1,2,3].map(w=>`
    <button class="week-tab ${state.week===w?'active':''}" onclick="setWeek(${w})">
      <div class="week-tab-num">Week ${w}</div>
      <div class="week-tab-theme">${PROGRAM[w].theme}</div>
    </button>`).join('');
  const dayPills = DAYS.map(d=>`
    <button class="day-pill ${state.day===d?'active':''}" onclick="setDay('${d}')">
      <div class="day-pill-name">${d}</div>
      <div class="day-pill-focus">${PROGRAM[state.week].days[d].focus.split(' ')[0]}</div>
    </button>`).join('');
  const tagColor = TAG_COLOR[dd.tag]||'#64748b';
  const exRows = isRest ? '' : dd.ex.map(([name,sets,reps,note])=>`
    <tr>
      <td><span class="ex-name">${name}</span></td>
      <td><span class="ex-sets">${sets}</span></td>
      <td><span class="ex-reps">${reps}</span></td>
      <td><span class="ex-note">${note}</span></td>
    </tr>`).join('');
  const detailInner = isRest
    ? `<div class="rest-day">🌙<br><br>Full rest day.<br>Sleep, protein, recovery — all part of the program.</div>`
    : `<div class="workout-header">
        <span class="workout-title">${dd.focus}</span>
        <span class="tag-badge" style="background:${tagColor}22;color:${tagColor}">${dd.tag}</span>
       </div>
       <div class="workout-note">${dd.note}</div>
       <table class="ex-table">
         <thead><tr><th style="width:36%">Exercise</th><th style="width:13%">Sets</th><th style="width:16%">Reps</th><th>Notes</th></tr></thead>
         <tbody>${exRows}</tbody>
       </table>`;
  return `
    <div class="week-tabs">${weekTabs}</div>
    <p style="font-size:12px;color:var(--text4);margin-bottom:12px;line-height:1.6">${wk.sub}</p>
    <div class="day-pills">${dayPills}</div>
    <div class="card">${detailInner}</div>`;
}

function renderDiet() {
  const {protein,carbs,fat} = state.macros;
  const kcal = protein*4 + carbs*4 + fat*9;
  const rings = [
    {label:"Protein",val:protein,max:130,color:"#3b82f6"},
    {label:"Carbs",val:carbs,max:180,color:"#f97316"},
    {label:"Fat",val:fat,max:60,color:"#a855f7"}
  ];
  const ringsSVG = rings.map(r=>{
    const pct=Math.min(r.val/r.max,1), rad=28, circ=2*Math.PI*rad;
    return `<div class="ring-wrap">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle cx="36" cy="36" r="${rad}" fill="none" stroke="#1e293b" stroke-width="6"/>
        <circle cx="36" cy="36" r="${rad}" fill="none" stroke="${r.color}" stroke-width="6"
          stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct)}"
          stroke-linecap="round" transform="rotate(-90 36 36)"
          style="transition:stroke-dashoffset .5s ease"/>
        <text x="36" y="40" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">${r.val}g</text>
      </svg>
      <span class="ring-label">${r.label}</span>
    </div>`;
  }).join('');
  const mealsHTML = MEALS.map(m=>`
    <div class="card">
      <div class="meal-header"><span class="meal-name">${m.icon} ${m.name}</span><span class="meal-cals">~${m.cals} kcal</span></div>
      <div class="meal-time">${m.time}</div>
      ${m.items.map(([name,p,c,f])=>`
        <div class="meal-row">
          <span class="meal-item">${name}</span>
          <span class="meal-macros">${p}p·${c}c·${f}f</span>
        </div>`).join('')}
    </div>`).join('');
  return `
    <div class="card">
      <div class="section-eyebrow">Today's macros</div>
      <div class="macro-rings">
        ${ringsSVG}
        <div class="calorie-center">
          <div class="calorie-num">${kcal}</div>
          <div class="calorie-sub">/ 1,950 kcal</div>
        </div>
      </div>
      <div class="macro-inputs">
        <div class="input-wrap"><label>Protein (g)</label><input type="number" id="inp-protein" value="${protein}" min="0" max="300" inputmode="numeric" onchange="setMacro('protein',this.value)"></div>
        <div class="input-wrap"><label>Carbs (g)</label><input type="number" id="inp-carbs" value="${carbs}" min="0" max="400" inputmode="numeric" onchange="setMacro('carbs',this.value)"></div>
        <div class="input-wrap"><label>Fat (g)</label><input type="number" id="inp-fat" value="${fat}" min="0" max="200" inputmode="numeric" onchange="setMacro('fat',this.value)"></div>
      </div>
      <button class="reset-btn" onclick="resetMacros()">Reset today</button>
    </div>
    <div class="info-box"><strong style="color:#60a5fa">Daily targets:</strong> 1,950 kcal · 130g protein · 180g carbs · 60g fat</div>
    ${mealsHTML}`;
}

function renderProgress() {
  const today = new Date().toISOString().slice(0,10);
  const histHTML = state.logs.length===0
    ? `<div class="empty-state">No entries yet — log your first weigh-in above.</div>`
    : `<div class="section-eyebrow" style="margin-top:4px">History</div>`
      + state.logs.map((entry,i)=>{
          const prev = state.logs[i+1];
          const diff = prev ? (parseFloat(entry.weight)-parseFloat(prev.weight)).toFixed(1) : null;
          const diffColor = diff===null?'':parseFloat(diff)<0?'#10b981':parseFloat(diff)>0?'#ef4444':'#64748b';
          return `<div class="log-entry">
            <div>
              <div class="log-weight">${entry.weight} lbs</div>
              ${entry.note?`<div class="log-note">${entry.note}</div>`:''}
            </div>
            <div>
              <div class="log-date">${entry.date}</div>
              ${diff!==null?`<div class="log-diff" style="color:${diffColor}">${parseFloat(diff)>0?'+':''}${diff} lbs</div>`:''}
            </div>
          </div>`;
        }).join('');
  return `
    <div class="card">
      <div class="section-eyebrow">Log today</div>
      <div class="progress-input-grid">
        <div><div class="field-label">Date</div><input class="field-input" type="date" id="log-date" value="${today}"></div>
        <div><div class="field-label">Weight (lbs)</div><input class="field-input" type="number" id="log-weight" placeholder="160" inputmode="decimal" step="0.1"></div>
      </div>
      <div style="margin-bottom:8px">
        <div class="field-label">Note (optional)</div>
        <input class="field-input" type="text" id="log-note" placeholder="PRs, energy, how you felt...">
      </div>
      <button class="save-btn" onclick="saveLog()">Save entry</button>
    </div>
    ${histHTML}`;
}

// ── EVENTS ──────────────────────────────────────────────────────────────────
function bindEvents() {}
function switchTab(t){ state.tab=t; render(); document.getElementById('scroll-area').scrollTop=0; }
function setWeek(w){ state.week=w; render(); }
function setDay(d){ state.day=d; render(); }
function setMacro(key,val){ state.macros[key]=Math.max(0,parseInt(val)||0); saveState(); render(); }
function resetMacros(){ state.macros={protein:0,carbs:0,fat:0}; saveState(); render(); }
function saveLog(){
  const date=document.getElementById('log-date').value;
  const weight=document.getElementById('log-weight').value;
  const note=document.getElementById('log-note').value;
  if(!weight) return;
  state.logs = [{id:Date.now(),date,weight,note},...state.logs].slice(0,60);
  saveState(); render();
}

render();
</script>
</body>
